<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#10016; newtown &#10016;</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1520;
      overflow: hidden;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #game-container canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 8px;
      box-shadow: 0 4px 30px rgba(200, 120, 152, 0.1);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="/game/lib/phaser.min.js"></script>
  <script src="/game/js/config.js?v=5"></script>
  <script src="/game/js/systems/APIClient.js"></script>
  <script src="/game/js/systems/DialogSystem.js"></script>
  <script src="/game/js/systems/CharacterManager.js"></script>
  <script src="/game/js/systems/PossessionManager.js"></script>
  <script src="/game/js/scenes/TitleScene.js?v=5"></script>
  <script src="/game/js/scenes/BootScene.js?v=7"></script>
  <script src="/game/js/scenes/WorldScene.js?v=5"></script>
  <script src="/game/js/scenes/DialogScene.js?v=5"></script>
  <script>
    const game = new Phaser.Game({
      type: Phaser.AUTO,
      width: GAME_CONFIG.WIDTH,
      height: GAME_CONFIG.HEIGHT,
      parent: 'game-container',
      pixelArt: true,
      roundPixels: true,
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
      backgroundColor: '#1a1520',
      scene: [TitleScene, BootScene, WorldScene, DialogScene],
    });
  </script>
</body>
</html>
