<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWTOWN CHRONICLES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="/skins/early-load.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper-bg: #090b17;
      --paper-text: #d6daee;
      --paper-dim: #8d95b8;
      --paper-heading: #f1f4ff;
      --paper-border: rgba(92, 133, 255, 0.28);
      --paper-controls: rgba(92, 133, 255, 0.18);
      --paper-btn: rgba(124, 145, 214, 0.45);
      --paper-btn-hover: #8ab4f8;
      --paper-entry-border: rgba(108, 132, 214, 0.26);
      --paper-entry-bg: rgba(16, 20, 38, 0.88);
      --paper-entry-hover-border: rgba(138, 180, 248, 0.65);
      --paper-entry-hover-bg: rgba(19, 25, 48, 0.96);
    }

    body {
      background: var(--paper-bg);
      color: var(--paper-text);
      font-family: var(--font-mono, 'Share Tech Mono', monospace);
      min-height: 100vh;
      padding-top: 32px; /* nav bar */
      padding-bottom: 28px; /* telemetry bar */
    }

    .masthead {
      border-bottom: 2px solid var(--paper-border);
      padding: 24px 40px 16px;
      display: flex;
      align-items: baseline;
      gap: 24px;
    }
    .masthead h1 {
      font-size: 32px;
      letter-spacing: 6px;
      color: var(--paper-heading);
      text-transform: uppercase;
    }
    .masthead .tagline {
      font-size: 11px;
      color: var(--paper-dim);
      letter-spacing: 2px;
    }
    .masthead .edition {
      margin-left: auto;
      font-size: 11px;
      color: var(--paper-dim);
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 10px 40px;
      border-bottom: 1px solid var(--paper-controls);
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--paper-btn);
      color: var(--paper-text);
      font-family: var(--font-mono, 'Share Tech Mono', monospace);
      font-size: 11px;
      padding: 3px 10px;
      letter-spacing: 1.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--paper-btn-hover); color: var(--paper-heading); }
    .filter-btn.active { border-color: #5e8cff; color: #5e8cff; }
    .controls .spacer { flex: 1; }
    #status-line { font-size: 11px; color: var(--paper-dim); letter-spacing: 1px; }

    .feed {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .entry {
      border: 1px solid var(--paper-entry-border);
      background: var(--paper-entry-bg);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .entry:hover { border-color: var(--paper-entry-hover-border); background: var(--paper-entry-hover-bg); }
    .entry.expanded { grid-column: span 2; }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .entry-type {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 1px 6px;
      border: 1px solid currentColor;
    }
    .entry-char {
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .entry-time {
      margin-left: auto;
      font-size: 10px;
      color: var(--paper-dim);
    }

    .entry-body {
      font-size: 12px;
      line-height: 1.7;
      color: var(--paper-text);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .entry.expanded .entry-body {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
      color: var(--paper-heading);
      white-space: pre-wrap;
    }

    .loading {
      text-align: center;
      padding: 80px;
      font-size: 13px;
      color: var(--paper-dim);
      letter-spacing: 2px;
      grid-column: 1 / -1;
    }

    .empty {
      text-align: center;
      padding: 80px;
      font-size: 12px;
      color: var(--paper-dim);
      letter-spacing: 2px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <h1>Newtown Chronicles</h1>
    <span class="tagline">dispatches from the wired</span>
    <span class="edition" id="edition-line">loading...</span>
  </div>

  <div class="controls">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="diary">DIARY</button>
    <button class="filter-btn" data-filter="dream">DREAM</button>
    <button class="filter-btn" data-filter="commune">COMMUNE</button>
    <button class="filter-btn" data-filter="curiosity">CURIOSITY</button>
    <button class="filter-btn" data-filter="letter">LETTER</button>
    <button class="filter-btn" data-filter="self-concept">SELF</button>
    <button class="filter-btn" data-filter="chat">CHAT</button>
    <div class="spacer"></div>
    <span id="status-line">fetching...</span>
  </div>

  <div class="feed" id="feed">
    <div class="loading">RECEIVING SIGNAL...</div>
  </div>

    <script src="/commune-newspaper.js"></script>

  <script src="/skins/loader.js"></script>
  <script src="/skins/picker.js"></script>
</body>
</html>
