# Lain reverse proxy configuration
# nginx on 198.211.116.5 (IP-only, no TLS)

upstream lain_web {
    server 127.0.0.1:3000;
}

upstream lain_dr_claude {
    server 127.0.0.1:3002;
}

upstream lain_pkd {
    server 127.0.0.1:3003;
}

upstream lain_mckenna {
    server 127.0.0.1:3004;
}

upstream lain_john {
    server 127.0.0.1:3005;
}

upstream lain_local {
    server 127.0.0.1:3001;
}

upstream lain_hiru {
    server 127.0.0.1:3006;
}

upstream lain_voice {
    server 127.0.0.1:8765;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Main Lain web interface + API
    location / {
        proxy_pass http://lain_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # --- Nav bar injection for character servers ---
    # These are proxied directly by nginx, so we use sub_filter to inject the nav bar
    # into their HTML responses (the main / location gets it from server.ts instead).

    # Dr. Claude character
    location /dr-claude/ {
        rewrite ^/dr-claude/(.*) /$1 break;
        proxy_pass http://lain_dr_claude;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # PKD character
    location /pkd/ {
        rewrite ^/pkd/(.*) /$1 break;
        proxy_pass http://lain_pkd;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # McKenna character
    location /mckenna/ {
        rewrite ^/mckenna/(.*) /$1 break;
        proxy_pass http://lain_mckenna;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # John character
    location /john/ {
        rewrite ^/john/(.*) /$1 break;
        proxy_pass http://lain_john;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # Local Lain
    location /local/ {
        rewrite ^/local/(.*) /$1 break;
        proxy_pass http://lain_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # Hiru character
    location /hiru/ {
        rewrite ^/hiru/(.*) /$1 break;
        proxy_pass http://lain_hiru;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 120s;
        sub_filter_once on;

        sub_filter '</head>' '<script src="/laintown-nav.js"></script><script src="/laintown-telemetry.js" defer></script></head>';
    }

    # Voice call service
    location /voice/ {
        rewrite ^/voice/(.*) /$1 break;
        proxy_pass http://lain_voice;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
