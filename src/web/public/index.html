<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWTOWN</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="holo-overlay"></div>

  <div class="container">
    <header class="header">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="6" fill="none" stroke="white" stroke-width="1"/>
            <circle cx="12" cy="12" r="2" fill="white"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="white" stroke-width="1"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="1"/>
            <line x1="2" y1="12" x2="6" y2="12" stroke="white" stroke-width="1"/>
            <line x1="18" y1="12" x2="22" y2="12" stroke="white" stroke-width="1"/>
          </svg>
        </div>
        <div class="logo-text">
          <div class="logo-title">NEWTOWN CONSOLE</div>
          <div class="logo-subtitle">THREE RESIDENTS // LOCAL TOWN</div>
        </div>
      </div>
      <div class="system-status">
        <div class="status-row">
          <span class="status-indicator"></span>
          <span>TOWN CORE ACTIVE</span>
        </div>
        <div class="status-row">
          <span class="status-label">LOCAL INFERENCE // NO INTERNET</span>
        </div>
      </div>
    </header>

    <main class="main-window">
      <div class="window-titlebar">
        <div class="window-title">COMMUNICATION INTERFACE</div>
        <div class="window-controls">
          <button class="window-btn"></button>
          <button class="window-btn"></button>
          <button class="window-btn"></button>
        </div>
      </div>

      <div class="chat-messages" id="messages">
        <div class="system-message">
          <span class="timestamp">[SYSTEM]</span>
          <span class="text">initializing newtown...</span>
        </div>
        <div class="system-message">
          <span class="timestamp">[SYSTEM]</span>
          <span class="text">neo, plato, and joe are available</span>
        </div>
        <div class="lain-message">
          <span class="sender">TOWN</span>
          <span class="text">the square is awake... say something</span>
        </div>
      </div>

      <div class="image-preview" id="image-preview" style="display: none;">
        <img id="preview-img" src="" alt="Preview" />
        <button type="button" class="remove-image" id="remove-image">x</button>
      </div>
      <div class="input-area">
        <form class="chat-input" id="chat-form">
          <input type="file" id="image-input" accept="image/*" style="display: none;" />
          <button type="button" class="image-btn" id="image-btn" title="Attach image">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
            </svg>
          </button>
          <div class="input-wrapper">
            <span class="input-icon">▶</span>
            <input
              type="text"
              id="message-input"
              placeholder="talk to the town..."
              autocomplete="off"
              autofocus
            />
          </div>
          <button type="submit" class="send-btn">
            <span>TRANSMIT</span>
          </button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-left">
        <div class="footer-item">
          <span class="footer-dot"></span>
          <span>NEO</span>
        </div>
        <div class="footer-item">
          <span class="footer-dot"></span>
          <span>PLATO</span>
        </div>
        <div class="footer-item">
          <span class="footer-dot"></span>
          <span>JOE</span>
        </div>
      </div>
      <div class="footer-right">
        NEWTOWN // MINI MAX BACKEND
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
