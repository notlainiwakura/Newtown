<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRU // POSSESS</title>
  <link rel="stylesheet" href="possess.css">
  <script src="skins/early-load.js"></script>
</head>
<body>
  <div class="app">
    <!-- Auth overlay -->
    <div class="auth-overlay" id="auth-overlay">
      <div class="auth-box">
        <div class="auth-title">POSSESSION</div>
        <div class="auth-subtitle">Enter token to take control</div>
        <form id="auth-form">
          <input type="password" id="auth-token" placeholder="token..." autocomplete="off" autofocus />
          <button type="submit">Connect</button>
        </form>
        <div class="auth-error" id="auth-error"></div>
      </div>
    </div>

    <!-- Main UI -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">HIRU</span>
        <span class="status-badge" id="status-badge">disconnected</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-possess" id="btn-possess">POSSESS</button>
        <button class="btn btn-release" id="btn-release" style="display:none">RELEASE</button>
      </div>
    </header>

    <div class="main">
      <!-- Left panel: town grid + who's here -->
      <aside class="sidebar">
        <div class="town-grid" id="town-grid"></div>
        <div class="whos-here">
          <div class="section-title">Who's here</div>
          <div class="whos-here-list" id="whos-here-list">
            <div class="empty-hint">possess to see</div>
          </div>
        </div>
      </aside>

      <!-- Right panel: chat + incoming -->
      <div class="content">
        <div class="chat-panel" id="chat-panel">
          <div class="chat-header" id="chat-header">
            <span class="chat-target">Select an inhabitant to talk</span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <form class="chat-input-form" id="chat-form">
            <input type="text" id="chat-input" placeholder="say something as Hiru..." autocomplete="off" disabled />
            <button type="submit" id="chat-send" disabled>Send</button>
          </form>
        </div>
        <div class="incoming-panel" id="incoming-panel">
          <div class="section-title">Incoming</div>
          <div class="incoming-list" id="incoming-list">
            <div class="empty-hint">no pending messages</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="possess.js"></script>
  <script src="skins/loader.js"></script>
  <script src="skins/picker.js"></script>
</body>
</html>
