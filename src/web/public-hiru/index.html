<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIRU // CHAT</title>
  <link rel="stylesheet" href="styles.css">
  <script src="skins/early-load.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-section">
        <div class="logo-icon">H</div>
        <div class="logo-text">
          <div class="logo-title">HIRU</div>
          <div class="logo-subtitle">CHAT</div>
        </div>
      </div>
      <div class="system-status">
        <div class="status-row">
          <span class="status-indicator"></span>
          <span>online</span>
        </div>
      </div>
    </header>

    <main class="main-window">
      <div class="chat-messages" id="messages">
        <div class="system-message">
          <span class="text">Connected</span>
        </div>
        <div class="character-message">
          <span class="sender">hiru</span>
          <span class="text">Hey.</span>
        </div>
      </div>

      <div class="input-area">
        <form class="chat-input" id="chat-form">
          <input
            type="text"
            id="message-input"
            placeholder="say something..."
            autocomplete="off"
            autofocus
          />
          <button type="submit" class="send-btn">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="skins/loader.js"></script>
  <script src="skins/picker.js"></script>
</body>
</html>
