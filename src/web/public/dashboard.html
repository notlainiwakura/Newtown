<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWTOWN // DASHBOARD</title>
  <script src="/skins/early-load.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090b17;
      --panel: #101426;
      --border: rgba(94, 140, 255, 0.22);
      --green: #7df7b4;
      --text: #c8d0ea;
      --bright: #f7f9ff;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
    }

    /* CRT scanline overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.08) 0px,
        rgba(0, 0, 0, 0.08) 1px,
        transparent 1px,
        transparent 3px
      );
    }

    /* ===== Layout ===== */
    .dashboard {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100vh;
      gap: 1px;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px;
    }

    .main {
      display: grid;
      grid-template-rows: minmax(200px, 1fr) minmax(150px, 1fr) auto;
      overflow: hidden;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      min-height: 0;
    }

    .middle-row {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .bottom-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      border-top: 1px solid var(--border);
      max-height: 120px;
    }

    /* ===== Panels ===== */
    .panel {
      background: var(--panel);
      padding: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      color: var(--green);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    /* Scrollbar */
    .panel-body::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track,
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.3); border-radius: 2px; }

    /* ===== Sidebar Sections ===== */
    .sidebar-section {
      margin-bottom: 12px;
    }

    .sidebar-section h3 {
      color: var(--green);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 3px;
    }

    /* Service health */
    .service-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 11px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff3333;
      flex-shrink: 0;
    }

    .status-dot.healthy {
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .service-name {
      color: var(--text);
    }

    .service-latency {
      margin-left: auto;
      color: #94a0c8;
      font-size: 10px;
    }

    /* Infrastructure bars */
    .infra-row {
      margin-bottom: 4px;
    }

    .infra-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      margin-bottom: 1px;
    }

    .infra-bar {
      height: 6px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .infra-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .infra-fill.green { background: var(--green); }
    .infra-fill.yellow { background: #ffff00; }
    .infra-fill.red { background: #ff3333; }

    .infra-text {
      font-size: 10px;
      color: #94a0c8;
      margin-top: 2px;
    }

    /* Loop health grid */
    .loop-grid {
      display: grid;
      grid-template-columns: 55px repeat(5, 1fr);
      gap: 2px;
      font-size: 9px;
    }

    .loop-header {
      color: #94a0c8;
      text-align: center;
      padding: 1px 0;
    }

    .loop-char {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 1px 0;
    }

    .loop-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto;
      background: #333;
    }

    .loop-dot.green { background: var(--green); }
    .loop-dot.yellow { background: #ffff00; }
    .loop-dot.red { background: #ff3333; }

    /* ===== Town Map ===== */
    .town-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      height: 100%;
    }

    .building-cell {
      background: rgba(0, 255, 65, 0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .building-cell:hover {
      border-color: rgba(0, 255, 65, 0.5);
    }

    .building-name {
      font-size: 9px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .building-residents {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .resident-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .resident-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dot-color);
      box-shadow: 0 0 6px var(--dot-color);
    }

    .resident-name {
      font-size: 7px;
      color: #555;
      white-space: nowrap;
    }

    /* ===== Relationship Graph ===== */
    .graph-container {
      position: relative;
      height: 100%;
    }

    #relationship-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ===== Tabs ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: #555;
      font-family: var(--font);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 4px 8px;
    }

    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-track { background: transparent; }
    .tab-content::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.3); border-radius: 2px; }

    .tab-pane { display: none; height: 100%; overflow-y: auto; }
    .tab-pane.active { display: block; }

    /* ===== Activity Stream ===== */
    .activity-entry {
      display: flex;
      gap: 6px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 11px;
      align-items: flex-start;
    }

    .activity-time {
      color: #444;
      font-size: 10px;
      flex-shrink: 0;
      width: 42px;
    }

    .activity-char {
      font-size: 10px;
      flex-shrink: 0;
      width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-badge {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
      color: #000;
      font-weight: bold;
    }

    .badge-research   { background: #4488ff; }
    .badge-diary      { background: #aa44ff; }
    .badge-dream      { background: #6644cc; }
    .badge-curiosity  { background: #00cccc; }
    .badge-letter     { background: #ff66aa; }
    .badge-commune    { background: var(--green); }
    .badge-therapy    { background: #ffff00; }
    .badge-self-concept { background: #8888ff; color: #fff; }
    .badge-narrative  { background: #ff8844; }
    .badge-other      { background: #444; color: #888; }

    .activity-text {
      color: var(--text);
      word-break: break-word;
      flex: 1;
    }

    /* ===== Conversations ===== */
    .convo-entry {
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 11px;
    }

    .convo-meta {
      font-size: 9px;
      color: #444;
      margin-bottom: 1px;
    }

    .convo-speaker {
      font-weight: bold;
    }

    .convo-text {
      color: var(--text);
      word-break: break-word;
    }

    /* ===== Memory Stats ===== */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }

    .memory-card {
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 6px;
    }

    .memory-char-name {
      font-size: 10px;
      margin-bottom: 3px;
    }

    .memory-count {
      font-size: 16px;
      color: var(--bright);
      font-weight: bold;
    }

    .memory-label {
      font-size: 9px;
      color: #555;
    }

    .ew-bar {
      height: 4px;
      background: #222;
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }

    .ew-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ===== Budget ===== */
    .budget-panel {
      padding: 8px;
    }

    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .budget-amount {
      font-size: 18px;
      color: var(--bright);
      font-weight: bold;
    }

    .budget-cap {
      font-size: 11px;
      color: #555;
    }

    .budget-bar {
      height: 8px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }

    .budget-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .budget-date {
      font-size: 10px;
      color: #444;
      margin-top: 3px;
    }

    /* ===== Empty state ===== */
    .empty-state {
      color: #333;
      text-align: center;
      padding: 20px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- ===== Sidebar ===== -->
    <div class="sidebar">
      <div style="color: var(--green); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 6px;">
        NEWTOWN DASH
      </div>

      <!-- Service Health -->
      <div class="sidebar-section">
        <h3>Services</h3>
        <div id="service-list"></div>
      </div>

      <!-- Infrastructure -->
      <div class="sidebar-section">
        <h3>Infrastructure</h3>
        <div id="infra-panel">
          <div class="infra-row">
            <div class="infra-label"><span>Disk</span><span id="disk-pct">--</span></div>
            <div class="infra-bar"><div class="infra-fill green" id="disk-fill" style="width:0%"></div></div>
          </div>
          <div class="infra-row">
            <div class="infra-label"><span>RAM</span><span id="ram-pct">--</span></div>
            <div class="infra-bar"><div class="infra-fill green" id="ram-fill" style="width:0%"></div></div>
          </div>
          <div class="infra-row">
            <div class="infra-label"><span>Swap</span><span id="swap-pct">--</span></div>
            <div class="infra-bar"><div class="infra-fill green" id="swap-fill" style="width:0%"></div></div>
          </div>
          <div class="infra-text">Load: <span id="load-text">--</span></div>
          <div class="infra-text">Uptime: <span id="uptime-text">--</span></div>
        </div>
      </div>

      <!-- Loop Health -->
      <div class="sidebar-section">
        <h3>Loop Health</h3>
        <div id="loop-grid" class="loop-grid">
          <!-- Header row -->
          <div class="loop-header"></div>
          <div class="loop-header">Diary</div>
          <div class="loop-header">Dream</div>
          <div class="loop-header">Curio</div>
          <div class="loop-header">Self</div>
          <div class="loop-header">Comm</div>
          <!-- Character rows injected by JS -->
        </div>
      </div>
    </div>

    <!-- ===== Main Area ===== -->
    <div class="main">
      <!-- Top Row: Town Map + Relationship Graph -->
      <div class="top-row">
        <div class="panel">
          <div class="panel-title">Town Map</div>
          <div class="panel-body">
            <div class="town-grid" id="town-grid"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">Relationships</div>
          <div class="panel-body graph-container">
            <canvas id="relationship-canvas"></canvas>
          </div>
        </div>
      </div>

      <!-- Middle: Tabbed Activity / Conversations -->
      <div class="middle-row">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="activity">Activity Stream</button>
          <button class="tab-btn" data-tab="conversations">Conversations</button>
        </div>
        <div class="tab-content">
          <div class="tab-pane active" id="tab-activity">
            <div id="activity-stream"></div>
            <div class="empty-state" id="activity-empty">Waiting for events...</div>
          </div>
          <div class="tab-pane" id="tab-conversations">
            <div id="conversation-stream"></div>
            <div class="empty-state" id="convo-empty">Waiting for conversations...</div>
          </div>
        </div>
      </div>

      <!-- Bottom Bar: Memory Stats + Budget -->
      <div class="bottom-bar">
        <div class="panel">
          <div class="panel-title">Memory Stats</div>
          <div class="panel-body">
            <div class="memory-grid" id="memory-grid"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">Budget</div>
          <div class="panel-body budget-panel" id="budget-panel">
            <div class="budget-header">
              <span class="budget-amount" id="budget-amount">--</span>
              <span class="budget-cap" id="budget-cap">/ --</span>
            </div>
            <div class="budget-bar"><div class="budget-fill" id="budget-fill" style="width:0%"></div></div>
            <div class="budget-date" id="budget-date">--</div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <script src="/dashboard.js"></script>


  <script src="/skins/loader.js"></script>
  <script src="/skins/picker.js"></script>
</body>
</html>
